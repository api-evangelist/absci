aid: absci
name: Absci
description: >-
  Absci is a Vancouver, Washington-based generative AI drug creation company
  (NASDAQ: ABSI) using AI and synthetic biology to design de novo antibodies
  in silico against specified epitopes. Its Integrated Drug Creation platform
  couples generative AI models — including the Origin-1 antibody foundation
  model — with a 77,000+ sq ft wet lab running proprietary SoluPro and ACE
  Assay technologies, screening millions of antibody sequence variants per
  cycle. The data flywheel between in silico design and high-throughput wet
  lab validation completes in as little as six weeks and can advance from
  target identification to development candidate in roughly 14 months.
  Absci's internal pipeline includes ABS-101, an anti-TL1A antibody for
  inflammatory bowel disease now in Phase 1; ABS-201, a novel anti-PRLR
  antibody for androgenetic alopecia in the Phase 1/2a HEADLINE trial; and
  ABS-301, a first-in-class AI-discovered oncology antibody. Strategic
  partnerships span AstraZeneca, Merck, Almirall, Twist Bioscience, NVIDIA,
  Owkin, Caltech, and the Gates Foundation. Absci's commercial model is
  therapeutic development (internal pipeline plus partnered programs and
  royalties); there is no public developer API, SDK, or open-source release
  of the Origin-1 model or its drug creation platform.
